name: CI/Scans Pipeline
on:
  pull_request:
    branches:
      - dev

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required for CodeQL to upload results
      pull-requests: write # Required for posting comments on PR
      actions: read       # Required for CodeQL to access workflow run information (Fixes CodeQL error)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- Static Code Analysis with CodeQL ---
    - name: Initialize CodeQL
      continue-on-error: true
      uses: github/codeql-action/init@v3
      with:
        languages: python # Specify the language(s)

    - name: Analyze Code with CodeQL
      continue-on-error: true
      uses: github/codeql-action/analyze@v3

    # --- OWASP Dependency Check ---
    - name: OWASP Dependency Check
      id: owasp_dependency_check
      uses: actions/dependency-review-action@v3
      continue-on-error: true # Ensure the workflow continues even if this step reports vulnerabilities

    # --- Setup Python Environment ---
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx requests
        pip install flake8 black mypy

    # --- Code Quality Checks ---
    - name: Lint with Flake8
      id: flake8_lint
      continue-on-error: true
      run: |
        # Capture all output and determine exit code
        if flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics > flake8_output.txt 2>&1; then
          echo "flake8_status=passed" >> $GITHUB_OUTPUT
          echo "Flake8 passed successfully" > flake8_result.txt
        else
          echo "flake8_status=failed" >> $GITHUB_OUTPUT
          cp flake8_output.txt flake8_result.txt
        fi
        
        # Add to step summary
        echo "## 🔍 Flake8 Linting Results" >> $GITHUB_STEP_SUMMARY
        cat flake8_result.txt >> $GITHUB_STEP_SUMMARY

    - name: Check formatting with Black
      id: black_format
      continue-on-error: true
      run: |
        if black --check . > black_output.txt 2>&1; then
          echo "black_status=passed" >> $GITHUB_OUTPUT
          echo "Black formatting check passed successfully" > black_result.txt
        else
          echo "black_status=failed" >> $GITHUB_OUTPUT
          echo "Black formatting issues found. Run 'black .' to fix:" > black_result.txt
          cat black_output.txt >> black_result.txt
        fi

        echo "## 💅 Black Formatting Results" >> $GITHUB_STEP_SUMMARY
        cat black_result.txt >> $GITHUB_STEP_SUMMARY

    - name: Type checking with Mypy
      id: mypy_type_check
      continue-on-error: true
      run: |
        if mypy src/ > mypy_output.txt 2>&1; then
          echo "mypy_status=passed" >> $GITHUB_OUTPUT
          echo "MyPy type checking passed successfully" > mypy_result.txt
        else
          echo "mypy_status=failed" >> $GITHUB_OUTPUT
          cp mypy_output.txt mypy_result.txt
        fi

        echo "## 📝 MyPy Type Checking Results" >> $GITHUB_STEP_SUMMARY
        cat mypy_result.txt >> $GITHUB_STEP_SUMMARY

    # --- Run Tests ---
    - name: Run Pytest
      id: pytest_tests
      continue-on-error: true
      run: |
        if pytest tests/ > pytest_output.txt 2>&1; then
          echo "pytest_status=passed" >> $GITHUB_OUTPUT
          echo "All tests passed successfully!" > pytest_result.txt
          echo "" >> pytest_result.txt
          tail -10 pytest_output.txt >> pytest_result.txt
        else
          echo "pytest_status=failed" >> $GITHUB_OUTPUT
          cp pytest_output.txt pytest_result.txt
        fi

        echo "## 🧪 Pytest Results" >> $GITHUB_STEP_SUMMARY
        cat pytest_result.txt >> $GITHUB_STEP_SUMMARY

    # --- Create PR Comment with Proper Formatting ---
    - name: Create PR Comment
      if: always()
      run: |
        # Start building the comment content
        cat > pr_comment.md << 'EOF'
        ## CI/Scans Pipeline Results 🚀
        
        EOF
        
        # Determine overall status
        OVERALL_STATUS="✅ Success"
        FAILED_CHECKS=""

        # Flake8 Results
        echo "### 🔍 Flake8 Linting" >> pr_comment.md
        if [ "${{ steps.flake8_lint.outputs.flake8_status }}" == "passed" ]; then
          echo "✅ **Passed** - No critical linting issues found" >> pr_comment.md
        else
          echo "❌ **Failed** - Linting issues detected" >> pr_comment.md
          FAILED_CHECKS+="Flake8, "
          OVERALL_STATUS="❌ Failed"
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Flake8 Output</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```' >> pr_comment.md
        cat flake8_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # Black Results
        echo "### 💅 Black Formatting" >> pr_comment.md
        if [ "${{ steps.black_format.outputs.black_status }}" == "passed" ]; then
          echo "✅ **Passed** - Code formatting is correct" >> pr_comment.md
        else
          echo "❌ **Failed** - Code formatting issues found" >> pr_comment.md
          FAILED_CHECKS+="Black, "
          OVERALL_STATUS="❌ Failed"
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Black Output</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```diff' >> pr_comment.md
        cat black_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # MyPy Results
        echo "### 📝 MyPy Type Checking" >> pr_comment.md
        if [ "${{ steps.mypy_type_check.outputs.mypy_status }}" == "passed" ]; then
          echo "✅ **Passed** - No type checking errors" >> pr_comment.md
        else
          echo "❌ **Failed** - Type checking errors found" >> pr_comment.md
          FAILED_CHECKS+="MyPy, "
          OVERALL_STATUS="❌ Failed"
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View MyPy Output</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```python' >> pr_comment.md
        cat mypy_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # Pytest Results
        echo "### 🧪 Pytest Tests" >> pr_comment.md
        if [ "${{ steps.pytest_tests.outputs.pytest_status }}" == "passed" ]; then
          echo "✅ **Passed** - All tests are passing" >> pr_comment.md
        else
          echo "❌ **Failed** - Some tests are failing" >> pr_comment.md
          FAILED_CHECKS+="Pytest, "
          OVERALL_STATUS="❌ Failed"
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Pytest Output</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```' >> pr_comment.md
        cat pytest_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # OWASP Dependency Check Results
        echo "### 🔒 OWASP Dependency Check" >> pr_comment.md
        if [ "${{ steps.owasp_dependency_check.outcome }}" == "failure" ]; then
          echo "❌ **Failed** - Vulnerabilities found in dependencies" >> pr_comment.md
          echo "Please check the **Dependency Review** tab for detailed vulnerability information." >> pr_comment.md
          FAILED_CHECKS+="OWASP Dependency Check, "
          OVERALL_STATUS="❌ Failed"
        else
          echo "✅ **Passed** - No known vulnerable dependencies found" >> pr_comment.md
        fi
        echo "" >> pr_comment.md

        # CodeQL Results
        echo "### 🛡️ CodeQL Analysis" >> pr_comment.md
        echo "📊 **Analysis Complete** - Results available in the **Security** tab" >> pr_comment.md
        echo "Security findings (if any) will appear as annotations in the **Files changed** tab." >> pr_comment.md
        echo "" >> pr_comment.md

        # Overall Status
        echo "---" >> pr_comment.md
        echo "" >> pr_comment.md
        echo "## 📊 Overall Pipeline Status" >> pr_comment.md
        echo "**Status:** $OVERALL_STATUS" >> pr_comment.md
        echo "" >> pr_comment.md
        
        if [ "$OVERALL_STATUS" == "❌ Failed" ]; then
          FAILED_CHECKS=${FAILED_CHECKS%, }  # Remove trailing comma and space
          echo "**Failed Checks:** $FAILED_CHECKS" >> pr_comment.md
          echo "" >> pr_comment.md
          echo "### 🔧 Quick Fix Commands" >> pr_comment.md
          echo '```bash' >> pr_comment.md
          echo "# Fix formatting issues" >> pr_comment.md
          echo "black ." >> pr_comment.md
          echo "" >> pr_comment.md
          echo "# Run tests locally" >> pr_comment.md
          echo "pytest tests/" >> pr_comment.md
          echo "" >> pr_comment.md
          echo "# Check linting" >> pr_comment.md
          echo "flake8 ." >> pr_comment.md
          echo "" >> pr_comment.md
          echo "# Type checking" >> pr_comment.md
          echo "mypy src/" >> pr_comment.md
          echo '```' >> pr_comment.md
        else
          echo "🎉 **All checks passed!** This PR is ready for review." >> pr_comment.md
        fi
        
        echo "" >> pr_comment.md
        echo "*Generated by CI/Scans Pipeline - $(date)*" >> pr_comment.md

        # Store the overall status for the final step
        echo "PIPELINE_STATUS=$OVERALL_STATUS" >> $GITHUB_ENV

    # --- Post PR Comment ---
    - name: Post PR Comment
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const comment = fs.readFileSync('pr_comment.md', 'utf8');
          
          // Check if we already have a comment from this workflow
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('CI/Scans Pipeline Results')
          );
          
          if (botComment) {
            // Update existing comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            // Create new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }

    # --- Final Status Check ---
    - name: Final Status Check
      if: always()
      run: |
        if [ "$PIPELINE_STATUS" == "❌ Failed" ]; then
          echo "Pipeline failed - one or more checks did not pass"
          exit 1
        else
          echo "Pipeline passed - all checks successful"
        fi