name: CI/Scans Pipeline
on:
  pull_request:
    branches:
      - dev

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required for CodeQL to upload results
      pull-requests: write # Required for posting comments on PR
      actions: read       # Required for CodeQL to access workflow run information (Fixes CodeQL error)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- Static Code Analysis with CodeQL ---
    - name: Initialize CodeQL
      continue-on-error: true
      uses: github/codeql-action/init@v3
      with:
        languages: python # Specify the language(s)

    - name: Analyze Code with CodeQL
      continue-on-error: true
      uses: github/codeql-action/analyze@v3

    # --- OWASP Dependency Check ---
    - name: OWASP Dependency Check
      id: owasp_dependency_check
      uses: actions/dependency-review-action@v3
      continue-on-error: true # Ensure the workflow continues even if this step reports vulnerabilities

    # --- Setup Python Environment ---
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx requests
        pip install flake8 black mypy

    # --- Code Quality Checks ---
    - name: Lint with Flake8
      id: flake8_lint
      continue-on-error: true
      run: |
        # Capture all output and determine exit code
        FLAKE8_FULL_OUTPUT=$(flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics 2>&1 || true)
        FLAKE8_EXIT_CODE=$?
        
        # Output the full log to GITHUB_STEP_SUMMARY
        echo "## 🔍 Flake8 Linting Results" >> $GITHUB_STEP_SUMMARY
        echo "$FLAKE8_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        # Pass the full output to a step output variable for the PR comment
        echo "flake8_output<<EOF" >> $GITHUB_OUTPUT
        echo "$FLAKE8_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $FLAKE8_EXIT_CODE -ne 0 ]; then
          echo "Flake8 found issues."
          echo "flake8_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Flake8 passed."
          echo "flake8_status=passed" >> $GITHUB_OUTPUT
        fi

    - name: Check formatting with Black
      id: black_format
      continue-on-error: true
      run: |
        BLACK_FULL_OUTPUT=$(black --check . 2>&1 || true)
        BLACK_EXIT_CODE=$?

        echo "## 💅 Black Formatting Results" >> $GITHUB_STEP_SUMMARY
        echo "$BLACK_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        echo "black_output<<EOF" >> $GITHUB_OUTPUT
        echo "$BLACK_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $BLACK_EXIT_CODE -ne 0 ]; then
          echo "Black found formatting issues. Run 'black .' to fix."
          echo "black_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Black formatting passed."
          echo "black_status=passed" >> $GITHUB_OUTPUT
        fi

    - name: Type checking with Mypy
      id: mypy_type_check
      continue-on-error: true
      run: |
        MYPY_FULL_OUTPUT=$(mypy src/ 2>&1 || true)
        MYPY_EXIT_CODE=$?

        echo "## 📝 MyPy Type Checking Results" >> $GITHUB_STEP_SUMMARY
        echo "$MYPY_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        echo "mypy_output<<EOF" >> $GITHUB_OUTPUT
        echo "$MYPY_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $MYPY_EXIT_CODE -ne 0 ]; then
          echo "Mypy found type errors."
          echo "mypy_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Mypy type checking passed."
          echo "mypy_status=passed" >> $GITHUB_OUTPUT
        fi

    # --- Run Tests ---
    - name: Run Pytest
      id: pytest_tests
      continue-on-error: true
      run: |
        PYTEST_FULL_OUTPUT=$(pytest tests/ 2>&1 || true)
        PYTEST_EXIT_CODE=$?

        echo "## 🧪 Pytest Results" >> $GITHUB_STEP_SUMMARY
        echo "$PYTEST_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        echo "pytest_output<<EOF" >> $GITHUB_OUTPUT
        echo "$PYTEST_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $PYTEST_EXIT_CODE -ne 0 ]; then
          echo "Pytest found failing tests."
          echo "pytest_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Pytest tests passed."
          echo "pytest_status=passed" >> $GITHUB_OUTPUT
        fi

    # --- Final Status Check and Prepare PR Comment ---
    - name: Determine Overall Status and Prepare PR Comment
      id: prepare_comment
      if: always() # Ensure this step runs even if previous steps fail
      run: |
        # It's better to construct the entire comment string in JavaScript for robustness,
        # but if we must do it in shell, variables must be robustly quoted.

        # Correctly define the marker
        COMMENT_MARKER=""
        
        # Build the PR comment string. Use double quotes and careful string concatenation.
        # This is where the magic happens: the ${{...}} expressions are interpolated
        # by GitHub Actions before the shell script runs.
        # The key is to ensure the interpolated strings are treated as single arguments
        # and don't break the shell's parsing.
        PR_COMMENT=$(cat <<EOMARKDOWN
        ## CI/Scans Pipeline Results 🚀

        ${COMMENT_MARKER}

        ### 🔍 Flake8 Linting: ${{ steps.flake8_lint.outputs.flake8_status == 'passed' && '✅ Passed' || '❌ Failed' }}
        \`\`\`
        ${{ steps.flake8_lint.outputs.flake8_output }}
        \`\`\`

        ### 💅 Black Formatting: ${{ steps.black_format.outputs.black_status == 'passed' && '✅ Passed' || '❌ Failed' }}
        \`\`\`
        ${{ steps.black_format.outputs.black_output }}
        \`\`\`

        ### 📝 MyPy Type Checking: ${{ steps.mypy_type_check.outputs.mypy_status == 'passed' && '✅ Passed' || '❌ Failed' }}
        \`\`\`
        ${{ steps.mypy_type_check.outputs.mypy_output }}
        \`\`\`

        ### 🧪 Pytest: ${{ steps.pytest_tests.outputs.pytest_status == 'passed' && '✅ Passed' || '❌ Failed' }}
        \`\`\`
        ${{ steps.pytest_tests.outputs.pytest_output }}
        \`\`\`

        ### 🔒 OWASP Dependency Check: ${{ steps.owasp_dependency_check.outcome == 'failure' && '❌ Failed (Vulnerabilities Found)' || '✅ Passed' }}
        ${{ steps.owasp_dependency_check.outcome == 'failure' && 'Please check the **Dependency Review** tab and the workflow run summary for details on detected vulnerabilities.' || 'No known vulnerable dependencies found.' }}

        ### 🛡️ CodeQL Analysis:
        Results are available in the **Security** tab of your repository and as file annotations in the **Files changed** tab of this PR.

        ---
        **Overall Pipeline Status:**
        EOMARKDOWN
        )

        OVERALL_STATUS="✅ Success"
        FAILED_CHECKS=""

        if [ "${{ steps.flake8_lint.outputs.flake8_status }}" == "failed" ]; then FAILED_CHECKS+="Flake8,"; OVERALL_STATUS="❌ Failed"; fi
        if [ "${{ steps.black_format.outputs.black_status }}" == "failed" ]; then FAILED_CHECKS+="Black,"; OVERALL_STATUS="❌ Failed"; fi
        if [ "${{ steps.mypy_type_check.outputs.mypy_status }}" == "failed" ]; then FAILED_CHECKS+="MyPy,"; OVERALL_STATUS="❌ Failed"; fi
        if [ "${{ steps.pytest_tests.outputs.pytest_status }}" == "failed" ]; then FAILED_CHECKS+="Pytest,"; OVERALL_STATUS="❌ Failed"; fi
        if [ "${{ steps.owasp_dependency_check.outcome }}" == "failure" ]; then FAILED_CHECKS+="OWASP Dependency Check,"; OVERALL_STATUS="❌ Failed"; fi

        # Append overall status and failed checks
        PR_COMMENT+="${OVERALL_STATUS}\n"
        if [ -n "$FAILED_CHECKS" ]; then
          PR_COMMENT+="**Issues found in:** ${FAILED_CHECKS%,}\n"
        fi

        echo "$PR_COMMENT" >> $GITHUB_STEP_SUMMARY # Add to workflow summary for quick viewing in UI
        
        # Pass the entire comment body and overall status as outputs
        echo "pr_comment_body<<EOF" >> $GITHUB_OUTPUT
        echo "$PR_COMMENT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT


    # --- Use actions/github-script to post/update the PR comment ---
    - name: Post or Update PR Comment
      uses: actions/github-script@v6 # Using v6 for actions/github-script
      if: github.event_name == 'pull_request' # Only post comment on pull requests
      with:
        script: |
          const commentBody = `${{ steps.prepare_comment.outputs.pr_comment_body }}`;
          const issueNumber = context.issue.number;
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const marker = ''; // Must match the marker in prepare_comment step

          // Search for existing comment with the marker
          const { data: comments } = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number: issueNumber,
          });

          const existingComment = comments.find(comment => comment.body.includes(marker));

          if (existingComment) {
            // Update existing comment
            console.log(`Updating existing comment: ${existingComment.id}`);
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existingComment.id,
              body: commentBody
            });
          } else {
            // Create a new comment
            console.log('Creating new comment.');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody
            });
          }
        github-token: ${{ secrets.GITHUB_TOKEN }} # Pass the GITHUB_TOKEN directly

    # --- Fail the job if any check failed ---
    - name: Fail if pipeline status is failed
      if: steps.prepare_comment.outputs.overall_status == '❌ Failed'
      run: |
        echo "Pipeline failed due to errors in checks."
        exit 1
