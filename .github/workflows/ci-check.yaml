name: CI/Scans Pipeline
on:
  pull_request:
    branches:
      - dev

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required for CodeQL to upload results
      pull-requests: write # Required for posting comments on PR
      actions: read       # Required for CodeQL to access workflow run information (Fixes CodeQL error)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- Static Code Analysis with CodeQL ---
    - name: Initialize CodeQL
      continue-on-error: true
      uses: github/codeql-action/init@v3
      with:
        languages: python # Specify the language(s)

    - name: Analyze Code with CodeQL
      continue-on-error: true
      uses: github/codeql-action/analyze@v3

    # --- OWASP Dependency Check ---
    - name: OWASP Dependency Check
      id: owasp_dependency_check
      uses: actions/dependency-review-action@v3
      continue-on-error: true # Ensure the workflow continues even if this step reports vulnerabilities

    # --- Setup Python Environment ---
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx requests
        pip install flake8 black mypy

    # --- Code Quality Checks ---
    - name: Lint with Flake8
      id: flake8_lint
      continue-on-error: true
      run: |
        # Capture all output and determine exit code
        FLAKE8_FULL_OUTPUT=$(flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics 2>&1)
        FLAKE8_EXIT_CODE=$?
        
        # Output the full log to GITHUB_STEP_SUMMARY
        echo "## 🔍 Flake8 Linting Results" >> $GITHUB_STEP_SUMMARY
        echo "$FLAKE8_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        # Pass the full output to a step output variable for the PR comment
        echo "flake8_output<<EOF" >> $GITHUB_OUTPUT
        echo "$FLAKE8_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $FLAKE8_EXIT_CODE -ne 0 ]; then
          echo "Flake8 found issues."
          echo "flake8_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Flake8 passed."
          echo "flake8_status=passed" >> $GITHUB_OUTPUT
        fi

    - name: Check formatting with Black
      id: black_format
      continue-on-error: true
      run: |
        BLACK_FULL_OUTPUT=$(black --check . 2>&1)
        BLACK_EXIT_CODE=$?

        echo "## 💅 Black Formatting Results" >> $GITHUB_STEP_SUMMARY
        echo "$BLACK_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        echo "black_output<<EOF" >> $GITHUB_OUTPUT
        echo "$BLACK_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $BLACK_EXIT_CODE -ne 0 ]; then
          echo "Black found formatting issues. Run 'black .' to fix."
          echo "black_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Black formatting passed."
          echo "black_status=passed" >> $GITHUB_OUTPUT
        fi

    - name: Type checking with Mypy
      id: mypy_type_check
      continue-on-error: true
      run: |
        MYPY_FULL_OUTPUT=$(mypy src/ 2>&1)
        MYPY_EXIT_CODE=$?

        echo "## 📝 MyPy Type Checking Results" >> $GITHUB_STEP_SUMMARY
        echo "$MYPY_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        echo "mypy_output<<EOF" >> $GITHUB_OUTPUT
        echo "$MYPY_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $MYPY_EXIT_CODE -ne 0 ]; then
          echo "Mypy found type errors."
          echo "mypy_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Mypy type checking passed."
          echo "mypy_status=passed" >> $GITHUB_OUTPUT
        fi

    # --- Run Tests ---
    - name: Run Pytest
      id: pytest_tests
      continue-on-error: true
      run: |
        PYTEST_FULL_OUTPUT=$(pytest tests/ 2>&1)
        PYTEST_EXIT_CODE=$?

        echo "## 🧪 Pytest Results" >> $GITHUB_STEP_SUMMARY
        echo "$PYTEST_FULL_OUTPUT" | tee -a $GITHUB_STEP_SUMMARY

        echo "pytest_output<<EOF" >> $GITHUB_OUTPUT
        echo "$PYTEST_FULL_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $PYTEST_EXIT_CODE -ne 0 ]; then
          echo "Pytest found failing tests."
          echo "pytest_status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "Pytest tests passed."
          echo "pytest_status=passed" >> $GITHUB_OUTPUT
        fi

    # --- Final Status Check and PR Comment ---
    - name: Determine Overall Status and Post PR Comment
      if: always() # Ensure this step runs even if previous steps fail
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Explicitly pass GITHUB_TOKEN as GH_TOKEN for gh CLI
      run: |
        PR_COMMENT="## CI/Scans Pipeline Results 🚀\n\n"
        OVERALL_STATUS="✅ Success"
        FAILED_CHECKS=""

        # Flake8
        PR_COMMENT+="### 🔍 Flake8 Linting: ${{ steps.flake8_lint.outputs.flake8_status == 'passed' && '✅ Passed' || '❌ Failed' }}\n"
        PR_COMMENT+="\`\`\`\n${{ steps.flake8_lint.outputs.flake8_output }}\n\`\`\`\n\n"
        if [ "${{ steps.flake8_lint.outputs.flake8_status }}" == "failed" ]; then
          FAILED_CHECKS+="Flake8,"
          OVERALL_STATUS="❌ Failed"
        fi

        # Black
        PR_COMMENT+="### 💅 Black Formatting: ${{ steps.black_format.outputs.black_status == 'passed' && '✅ Passed' || '❌ Failed' }}\n"
        PR_COMMENT+="\`\`\`\n${{ steps.black_format.outputs.black_output }}\n\`\`\`\n\n"
        if [ "${{ steps.black_format.outputs.black_status }}" == "failed" ]; then
          FAILED_CHECKS+="Black,"
          OVERALL_STATUS="❌ Failed"
        fi

        # MyPy
        PR_COMMENT+="### 📝 MyPy Type Checking: ${{ steps.mypy_type_check.outputs.mypy_status == 'passed' && '✅ Passed' || '❌ Failed' }}\n"
        PR_COMMENT+="\`\`\`\n${{ steps.mypy_type_check.outputs.mypy_output }}\n\`\`\`\n\n"
        if [ "${{ steps.mypy_type_check.outputs.mypy_status }}" == "failed" ]; then
          FAILED_CHECKS+="MyPy,"
          OVERALL_STATUS="❌ Failed"
        fi

        # Pytest
        PR_COMMENT+="### 🧪 Pytest: ${{ steps.pytest_tests.outputs.pytest_status == 'passed' && '✅ Passed' || '❌ Failed' }}\n"
        PR_COMMENT+="\`\`\`\n${{ steps.pytest_tests.outputs.pytest_output }}\n\`\`\`\n\n"
        if [ "${{ steps.pytest_tests.outputs.pytest_status }}" == "failed" ]; then
          FAILED_CHECKS+="Pytest,"
          OVERALL_STATUS="❌ Failed"
        fi

        # OWASP Dependency Check
        PR_COMMENT+="### 🔒 OWASP Dependency Check: "
        if [ "${{ steps.owasp_dependency_check.outcome }}" == "failure" ]; then
          PR_COMMENT+="❌ Failed (Vulnerabilities Found)\n"
          PR_COMMENT+="Please check the **Dependency Review** tab and the workflow run summary for details on detected vulnerabilities.\n\n"
          FAILED_CHECKS+="OWASP Dependency Check,"
          OVERALL_STATUS="❌ Failed"
        else
          PR_COMMENT+="✅ Passed\n"
          PR_COMMENT+="No known vulnerable dependencies found.\n\n"
        fi

        # CodeQL (Note about where to find results)
        PR_COMMENT+="### 🛡️ CodeQL Analysis:\n"
        PR_COMMENT+="Results are available in the **Security** tab of your repository and as file annotations in the **Files changed** tab of this PR.\n\n"

        PR_COMMENT+="---\n"
        PR_COMMENT+="**Overall Pipeline Status:** ${OVERALL_STATUS}\n"

        if [ -n "$FAILED_CHECKS" ]; then
          PR_COMMENT+="**Issues found in:** ${FAILED_CHECKS%,}\n"
        fi

        echo "$PR_COMMENT" >> $GITHUB_STEP_SUMMARY # Add to workflow summary for quick viewing in UI

        # Pass the entire comment body to the next step
        echo "pr_comment_body<<EOF" >> $GITHUB_OUTPUT
        echo "$PR_COMMENT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        # Set overall status as an output
        echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT

    # --- Use peter-evans/create-or-update-comment to post the comment ---
    - name: Post PR Comment
      uses: peter-evans/create-or-update-comment@v4
      if: github.event_name == 'pull_request' # Only post comment on pull requests
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: ${{ steps.prepare_comment.outputs.pr_comment_body }}
        # This is the key to overwriting/updating the comment!
        # Provide a unique string that identifies this specific comment from your workflow.
        # The action will look for an existing comment with this unique ID and update it.
        unique-id: 'ci-scan-results-summary' # Choose a unique identifier for your pipeline's comment

    # --- Fail the job if any check failed ---
    - name: Fail if pipeline status is failed
      if: steps.prepare_comment.outputs.overall_status == '❌ Failed'
      run: |
        echo "Pipeline failed due to errors in checks."
        exit 1
