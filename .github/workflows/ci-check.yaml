name: CI/Scans Pipeline
on:
  pull_request:
    branches:
      - dev

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required for CodeQL to upload results
      pull-requests: write # Required for posting comments on PR
      actions: read       # Required for CodeQL to access workflow run information

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Write .env file from secret
      run: echo "${{ secrets.TEST_ENV }}" > src/config/.env

    # --- OWASP Dependency Check (Comprehensive) ---
    - name: OWASP Dependency Check
      id: owasp_check
      uses: dependency-check/Dependency-Check_Action@main
      continue-on-error: true
      with:
        project: 'security-scan'
        path: '.'
        format: 'ALL'  # Generates ALL formats
        out: './owasp-reports'
        args: '--enableRetired --enableExperimental --failOnCVSS 7.0'

    - name: Process OWASP Results
      id: process_owasp
      if: always()
      run: |
        echo "Processing OWASP Dependency Check results..."
        
        # Initialize status as unknown
        echo "owasp_status=unknown" >> $GITHUB_OUTPUT
        
        if [ -f "./owasp-reports/dependency-check-report.json" ]; then
          echo "✅ OWASP JSON report found, parsing results..."
          
          # Check if jq is available
          if command -v jq >/dev/null 2>&1; then
            # Count total vulnerabilities - handle empty arrays properly
            VULN_COUNT=$(jq '[.dependencies[]? | select(.vulnerabilities != null) | .vulnerabilities[]] | length' ./owasp-reports/dependency-check-report.json 2>/dev/null || echo "0")
            HIGH_VULN_COUNT=$(jq '[.dependencies[]? | select(.vulnerabilities != null) | .vulnerabilities[] | select((.cvssv3?.baseScore // 0) >= 7.0 or (.cvssv2?.score // 0) >= 7.0)] | length' ./owasp-reports/dependency-check-report.json 2>/dev/null || echo "0")
            
            echo "Found $VULN_COUNT total vulnerabilities"
            echo "Found $HIGH_VULN_COUNT high/critical vulnerabilities"
            
            if [ "$VULN_COUNT" -gt 0 ]; then
              if [ "$HIGH_VULN_COUNT" -gt 0 ]; then
                echo "owasp_status=failed" >> $GITHUB_OUTPUT
                echo "❌ Found $VULN_COUNT total vulnerabilities ($HIGH_VULN_COUNT high/critical):" > owasp_result.txt
              else
                echo "owasp_status=warning" >> $GITHUB_OUTPUT
                echo "⚠️ Found $VULN_COUNT low/medium vulnerabilities:" > owasp_result.txt
              fi
              echo "" >> owasp_result.txt
              
              # List vulnerable dependencies with better error handling
              jq -r '.dependencies[]? | select(.vulnerabilities != null and (.vulnerabilities | length > 0)) | "📦 " + .fileName + "\n" + (.vulnerabilities[] | "  └─ " + .name + " (CVSS: " + ((.cvssv3?.baseScore // .cvssv2?.score // "Unknown") | tostring) + ")")' ./owasp-reports/dependency-check-report.json >> owasp_result.txt 2>/dev/null || echo "  └─ Error parsing vulnerability details" >> owasp_result.txt
            else
              echo "owasp_status=passed" >> $GITHUB_OUTPUT
              echo "✅ No vulnerabilities detected in dependencies" > owasp_result.txt
            fi
          else
            echo "⚠️ jq not available for parsing"
            echo "owasp_status=unknown" >> $GITHUB_OUTPUT
            echo "⚠️ Could not parse OWASP report (jq not available)" > owasp_result.txt
          fi
        else
          echo "❌ OWASP JSON report not found at ./owasp-reports/dependency-check-report.json"
          echo "📁 Checking available files:"
          find ./owasp-reports -name "*.json" -type f 2>/dev/null | head -10 || echo "No JSON files found"
          find ./owasp-reports -name "*.html" -type f 2>/dev/null | head -5 || echo "No HTML files found"
          echo "owasp_status=unknown" >> $GITHUB_OUTPUT
          echo "⚠️ OWASP report not generated" > owasp_result.txt
        fi

    # --- Upload OWASP Reports as Artifacts ---
    - name: Upload OWASP Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: owasp-dependency-html-report
        path: ./owasp-reports/dependency-check-report.html
        retention-days: 7

    # --- Setup Python Environment ---
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx requests
        pip install flake8 black mypy

    # --- Code Quality Checks ---
    - name: Lint with Flake8
      id: flake8_lint
      continue-on-error: true
      run: |
        # Run flake8 and capture both output and exit code
        set +e  # Don't exit on error
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics > flake8_output.txt 2>&1
        FLAKE8_EXIT_CODE=$?
        set -e  # Re-enable exit on error
        
        # Check the actual exit code, not the tee command
        if [ $FLAKE8_EXIT_CODE -eq 0 ]; then
          echo "✅ Flake8 passed successfully"
          echo "flake8_status=passed" >> $GITHUB_OUTPUT
          echo "✅ Flake8 passed successfully" > flake8_result.txt
          echo "" >> flake8_result.txt
          cat flake8_output.txt >> flake8_result.txt
        else
          echo "❌ Flake8 found linting issues"
          echo "flake8_status=failed" >> $GITHUB_OUTPUT
          echo "❌ Flake8 found linting issues:" > flake8_result.txt
          echo "" >> flake8_result.txt
          cat flake8_output.txt >> flake8_result.txt
        fi

    - name: Check formatting with Black
      id: black_format
      continue-on-error: true
      run: |
        # Run black and capture both output and exit code
        set +e  # Don't exit on error
        black --check . > black_output.txt 2>&1
        BLACK_EXIT_CODE=$?
        set -e  # Re-enable exit on error
        
        # Check the actual exit code
        if [ $BLACK_EXIT_CODE -eq 0 ]; then
          echo "✅ Black formatting check passed successfully"
          echo "black_status=passed" >> $GITHUB_OUTPUT
          echo "✅ Black formatting check passed successfully" > black_result.txt
          echo "" >> black_result.txt
          cat black_output.txt >> black_result.txt
        else
          echo "❌ Black formatting issues found"
          echo "black_status=failed" >> $GITHUB_OUTPUT
          echo "❌ Black formatting issues found. Run 'black .' to fix:" > black_result.txt
          echo "" >> black_result.txt
          cat black_output.txt >> black_result.txt
        fi

    # --- Run Tests ---
    - name: Run Pytest
      id: pytest_tests
      continue-on-error: true
      run: |
        # Run pytest and capture both output and exit code
        set +e  # Don't exit on error
        pytest tests/ --tb=short > pytest_output.txt 2>&1
        PYTEST_EXIT_CODE=$?
        set -e  # Re-enable exit on error
        
        # Check the actual exit code
        if [ $PYTEST_EXIT_CODE -eq 0 ]; then
          echo "✅ All tests passed successfully!"
          echo "pytest_status=passed" >> $GITHUB_OUTPUT
          echo "✅ All tests passed successfully!" > pytest_result.txt
          echo "" >> pytest_result.txt
          tail -10 pytest_output.txt >> pytest_result.txt
        else
          echo "❌ Some tests failed"
          echo "pytest_status=failed" >> $GITHUB_OUTPUT
          echo "❌ Some tests failed:" > pytest_result.txt
          echo "" >> pytest_result.txt
          cat pytest_output.txt >> pytest_result.txt
        fi

    # --- Run Sonarqube Analysis ---
    - name: Run Sonarqube Scan
      id: sonar_scan
      continue-on-error: true
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_PULLREQUEST_KEY: ${{ github.event.pull_request.number }}
        SONAR_PULLREQUEST_BRANCH: ${{ github.head_ref }}
        SONAR_PULLREQUEST_BASE: ${{ github.base_ref }}

    # # --- Run Sonarqube Quality Gate ---
    # - name: Run Sonarqube Quality Gate
    #   id: sonar_quality_gate
    #   continue-on-error: true
    #   uses: sonarsource/sonarqube-quality-gate-action@master
    #   timeout-minutes: 5
    #   env:
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # --- Process SonarQube Results ---
    - name: Process SonarQube Results
      id: process_sonarqube
      if: always()
      continue-on-error: true
      run: |
        echo "Processing SonarQube results..."
        
        # Initialize status as unknown
        echo "sonar_status=unknown" >> $GITHUB_OUTPUT
        echo "sonar_coverage=N/A" >> $GITHUB_OUTPUT
        echo "sonar_bugs=N/A" >> $GITHUB_OUTPUT
        echo "sonar_code_smells=N/A" >> $GITHUB_OUTPUT
        echo "sonar_security_hotspots=N/A" >> $GITHUB_OUTPUT
        echo "sonar_vulnerabilities=N/A" >> $GITHUB_OUTPUT
        echo "sonar_quality_gate=N/A" >> $GITHUB_OUTPUT
        
        # Check if scanner work directory exists
        if [ -f ".scannerwork/report-task.txt" ]; then
          echo "✅ SonarQube report found, extracting information..."
          
          # Extract task ID and server URL from report
          TASK_ID=$(grep "ceTaskId=" .scannerwork/report-task.txt | cut -d'=' -f2)
          SERVER_URL=$(grep "serverUrl=" .scannerwork/report-task.txt | cut -d'=' -f2)
          
          echo "Task ID: $TASK_ID"
          echo "Server URL: $SERVER_URL"
          
          # Build proper dashboard URL using project key
          PROJECT_KEY="${{ secrets.SONAR_PROJECT_KEY }}"
          DASHBOARD_URL="${SERVER_URL}/dashboard?id=${PROJECT_KEY}"
          
          echo "Dashboard URL: $DASHBOARD_URL"
          
          # Store dashboard URL for comment
          echo "sonar_dashboard_url=$DASHBOARD_URL" >> $GITHUB_OUTPUT
          
          # Wait a bit for SonarQube to process (alternative to quality gate action)
          echo "Waiting for SonarQube analysis to complete..."
          sleep 30
          
          # Try to get analysis results via SonarQube Web API
          if command -v curl >/dev/null 2>&1; then
            echo "Fetching project measures from SonarQube API..."
            
            # Fetch coverage
            COVERAGE_RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
              "$SERVER_URL/api/measures/component?component=$PROJECT_KEY&metricKeys=coverage" 2>/dev/null || echo "")
            
            echo "Coverage API Response: $COVERAGE_RESPONSE"
            
            if echo "$COVERAGE_RESPONSE" | grep -q '"value"'; then
              COVERAGE=$(echo "$COVERAGE_RESPONSE" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p' | head -1)
              if [ "$COVERAGE" != "" ]; then
                echo "sonar_coverage=${COVERAGE}%" >> $GITHUB_OUTPUT
              else
                echo "sonar_coverage=0.0%" >> $GITHUB_OUTPUT
              fi
            else
              echo "sonar_coverage=N/A" >> $GITHUB_OUTPUT
            fi
            
            # Fetch bugs, code smells, vulnerabilities, security hotspots
            MEASURES_RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
              "$SERVER_URL/api/measures/component?component=$PROJECT_KEY&metricKeys=bugs,code_smells,vulnerabilities,security_hotspots" 2>/dev/null || echo "")
            
            echo "Measures API Response: $MEASURES_RESPONSE"
            
            # Parse bugs
            if echo "$MEASURES_RESPONSE" | grep -q '"metric":"bugs"'; then
              BUGS=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"bugs"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
              if [ "$BUGS" != "" ]; then
                echo "sonar_bugs=$BUGS" >> $GITHUB_OUTPUT
              fi
            fi
            
            # Parse code smells
            if echo "$MEASURES_RESPONSE" | grep -q '"metric":"code_smells"'; then
              CODE_SMELLS=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"code_smells"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
              if [ "$CODE_SMELLS" != "" ]; then
                echo "sonar_code_smells=$CODE_SMELLS" >> $GITHUB_OUTPUT
              fi
            fi
            
            # Parse vulnerabilities
            if echo "$MEASURES_RESPONSE" | grep -q '"metric":"vulnerabilities"'; then
              VULNERABILITIES=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"vulnerabilities"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
              if [ "$VULNERABILITIES" != "" ]; then
                echo "sonar_vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
              fi
            fi
            
            # Parse security hotspots
            if echo "$MEASURES_RESPONSE" | grep -q '"metric":"security_hotspots"'; then
              SECURITY_HOTSPOTS=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"security_hotspots"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
              if [ "$SECURITY_HOTSPOTS" != "" ]; then
                echo "sonar_security_hotspots=$SECURITY_HOTSPOTS" >> $GITHUB_OUTPUT
              fi
            fi
            
            # Get Quality Gate status
            QG_RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
              "$SERVER_URL/api/qualitygates/project_status?projectKey=$PROJECT_KEY" 2>/dev/null || echo "")
            
            echo "Quality Gate API Response: $QG_RESPONSE"
            
            if echo "$QG_RESPONSE" | grep -q '"status"'; then
              QG_STATUS=$(echo "$QG_RESPONSE" | sed -n 's/.*"status":"\([^"]*\)".*/\1/p' | head -1)
              echo "sonar_quality_gate=$QG_STATUS" >> $GITHUB_OUTPUT
              
              if [ "$QG_STATUS" = "OK" ]; then
                echo "sonar_status=passed" >> $GITHUB_OUTPUT
                echo "✅ SonarQube Quality Gate: PASSED" > sonar_result.txt
              elif [ "$QG_STATUS" = "ERROR" ]; then
                echo "sonar_status=failed" >> $GITHUB_OUTPUT
                echo "❌ SonarQube Quality Gate: FAILED" > sonar_result.txt
              else
                echo "sonar_status=warning" >> $GITHUB_OUTPUT
                echo "⚠️ SonarQube Quality Gate: $QG_STATUS" > sonar_result.txt
              fi
            else
              echo "sonar_status=unknown" >> $GITHUB_OUTPUT
              echo "⚠️ Could not determine SonarQube Quality Gate status" > sonar_result.txt
            fi
            
            # Get actual values for the summary (using shell variables, not GitHub outputs which aren't available yet)
            ACTUAL_COVERAGE=$(echo "$COVERAGE_RESPONSE" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p' | head -1)
            ACTUAL_BUGS=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"bugs"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
            ACTUAL_CODE_SMELLS=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"code_smells"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
            ACTUAL_VULNERABILITIES=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"vulnerabilities"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
            ACTUAL_SECURITY_HOTSPOTS=$(echo "$MEASURES_RESPONSE" | sed -n '/"metric":"security_hotspots"/,/"value"/{s/.*"value":"\([^"]*\)".*/\1/p}' | head -1)
            
            # Add summary to result file
            echo "" >> sonar_result.txt
            echo "📊 Analysis Summary:" >> sonar_result.txt
            echo "" >> sonar_result.txt
            echo "| Metric | Value |" >> sonar_result.txt
            echo "|--------|-------|" >> sonar_result.txt
            echo "| 📊 Coverage | ${ACTUAL_COVERAGE:-N/A}% |" >> sonar_result.txt
            echo "| 🐛 Bugs | ${ACTUAL_BUGS:-0} |" >> sonar_result.txt
            echo "| 💻 Code Smells | ${ACTUAL_CODE_SMELLS:-0} |" >> sonar_result.txt
            echo "| 🔓 Vulnerabilities | ${ACTUAL_VULNERABILITIES:-0} |" >> sonar_result.txt
            echo "| 🔥 Security Hotspots | ${ACTUAL_SECURITY_HOTSPOTS:-0} |" >> sonar_result.txt
            echo "" >> sonar_result.txt
            echo "🔍 [View Full Analysis in SonarQube]($DASHBOARD_URL)" >> sonar_result.txt
            
          else
            echo "⚠️ curl not available for API calls"
            echo "sonar_status=unknown" >> $GITHUB_OUTPUT
            echo "⚠️ SonarQube analysis completed but could not fetch detailed results" > sonar_result.txt
            echo "🔍 View full report: $DASHBOARD_URL" >> sonar_result.txt
          fi
          
        else
          echo "❌ SonarQube report not found at .scannerwork/report-task.txt"
          echo "sonar_status=failed" >> $GITHUB_OUTPUT
          echo "❌ SonarQube analysis failed or report not generated" > sonar_result.txt
          echo "Check the SonarQube scan step for errors." >> sonar_result.txt
        fi
            
            # # Add summary to result file
            # echo "" >> sonar_result.txt
            # echo "📊 Analysis Summary:" >> sonar_result.txt
            # echo "Coverage: ${COVERAGE:-N/A}%" >> sonar_result.txt
            # echo "Bugs: ${BUGS:-N/A}" >> sonar_result.txt
            # echo "Code Smells: ${CODE_SMELLS:-N/A}" >> sonar_result.txt
            # echo "Vulnerabilities: ${VULNERABILITIES:-N/A}" >> sonar_result.txt
            # echo "Security Hotspots: ${SECURITY_HOTSPOTS:-N/A}" >> sonar_result.txt
            # echo "" >> sonar_result.txt
            # echo "🔍 View full report: $DASHBOARD_URL" >> sonar_result.txt

    # --- Create PR Comment with Results ---
    - name: Create PR Comment
      if: always()
      run: |
        cat > pr_comment.md << 'EOF'
        ## CI/Scans Pipeline Results 🚀
        
        EOF
        
        # Track failures and warnings separately
        HAS_FAILURES=false
        HAS_WARNINGS=false
        FAILED_CHECKS=""
        WARNING_CHECKS=""

        # Flake8 Results
        echo "### 🔍 Flake8 Linting" >> pr_comment.md
        if [ "${{ steps.flake8_lint.outputs.flake8_status }}" == "passed" ]; then
          echo "✅ **Passed** - No critical linting issues found" >> pr_comment.md
        else
          echo "❌ **Failed** - Linting issues detected" >> pr_comment.md
          FAILED_CHECKS+="Flake8, "
          HAS_FAILURES=true
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Details</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```' >> pr_comment.md
        cat flake8_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # Black Results
        echo "### 💅 Black Formatting" >> pr_comment.md
        if [ "${{ steps.black_format.outputs.black_status }}" == "passed" ]; then
          echo "✅ **Passed** - Code formatting is correct" >> pr_comment.md
        else
          echo "❌ **Failed** - Code formatting issues found" >> pr_comment.md
          FAILED_CHECKS+="Black, "
          HAS_FAILURES=true
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Details</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```diff' >> pr_comment.md
        cat black_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # Pytest Results
        echo "### 🧪 Pytest Tests" >> pr_comment.md
        if [ "${{ steps.pytest_tests.outputs.pytest_status }}" == "passed" ]; then
          echo "✅ **Passed** - All tests are passing" >> pr_comment.md
        else
          echo "❌ **Failed** - Some tests are failing" >> pr_comment.md
          FAILED_CHECKS+="Tests, "
          HAS_FAILURES=true
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Details</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```' >> pr_comment.md
        cat pytest_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # OWASP Results
        echo "### 🔒 OWASP Dependency Check" >> pr_comment.md
        if [ "${{ steps.process_owasp.outputs.owasp_status }}" == "passed" ]; then
          echo "✅ **Passed** - No vulnerable dependencies found" >> pr_comment.md
        elif [ "${{ steps.process_owasp.outputs.owasp_status }}" == "warning" ]; then
          echo "⚠️ **Warning** - Low/medium severity vulnerabilities found" >> pr_comment.md
          WARNING_CHECKS+="OWASP (Low/Medium), "
          HAS_WARNINGS=true
        elif [ "${{ steps.process_owasp.outputs.owasp_status }}" == "failed" ]; then
          echo "❌ **Failed** - High/critical vulnerabilities found" >> pr_comment.md
          FAILED_CHECKS+="OWASP (High/Critical), "
          HAS_FAILURES=true
        else
          echo "⚠️ **Unknown** - Could not determine vulnerability status" >> pr_comment.md
          WARNING_CHECKS+="OWASP (Unknown), "
          HAS_WARNINGS=true
        fi
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Details</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```' >> pr_comment.md
        cat owasp_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "" >> pr_comment.md
        echo "📊 **Additional Resources:**" >> pr_comment.md
        echo "- [Security Tab](https://github.com/${{ github.repository }}/security/dependabot) - View all dependency alerts" >> pr_comment.md
        echo "- [Dependency Graph](https://github.com/${{ github.repository }}/network/dependencies) - Visual dependency tree" >> pr_comment.md
        echo "- Download full OWASP reports (JSON & HTML) from workflow artifacts" >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # SonarQube Results
        echo "### 🔍 SonarQube Analysis" >> pr_comment.md
        if [ "${{ steps.process_sonarqube.outputs.sonar_status }}" == "passed" ]; then
          echo "✅ **Quality Gate: PASSED**" >> pr_comment.md
        elif [ "${{ steps.process_sonarqube.outputs.sonar_status }}" == "failed" ]; then
          echo "❌ **Quality Gate: FAILED**" >> pr_comment.md
          FAILED_CHECKS+="SonarQube, "
          HAS_FAILURES=true
        elif [ "${{ steps.process_sonarqube.outputs.sonar_status }}" == "warning" ]; then
          echo "⚠️ **Quality Gate: WARNING**" >> pr_comment.md
          WARNING_CHECKS+="SonarQube, "
          HAS_WARNINGS=true
        else
          echo "⚠️ **Status: UNKNOWN** - Could not determine quality gate status" >> pr_comment.md
          WARNING_CHECKS+="SonarQube (Unknown), "
          HAS_WARNINGS=true
        fi
        
        # # Add SonarQube summary table
        # echo "" >> pr_comment.md
        # echo "| Metric | Value |" >> pr_comment.md
        # echo "|--------|-------|" >> pr_comment.md
        # echo "| 📊 Coverage | ${{ steps.process_sonarqube.outputs.sonar_coverage }} |" >> pr_comment.md
        # echo "| 🐛 Bugs | ${{ steps.process_sonarqube.outputs.sonar_bugs }} |" >> pr_comment.md
        # echo "| 💻 Code Smells | ${{ steps.process_sonarqube.outputs.sonar_code_smells }} |" >> pr_comment.md
        # echo "| 🔓 Vulnerabilities | ${{ steps.process_sonarqube.outputs.sonar_vulnerabilities }} |" >> pr_comment.md
        # echo "| 🔥 Security Hotspots | ${{ steps.process_sonarqube.outputs.sonar_security_hotspots }} |" >> pr_comment.md
        # echo "" >> pr_comment.md
        
        # # Add link to SonarQube dashboard
        # if [ "${{ steps.process_sonarqube.outputs.sonar_dashboard_url }}" != "" ]; then
        #   echo "🔍 **[View Full Analysis in SonarQube](${{ steps.process_sonarqube.outputs.sonar_dashboard_url }})**" >> pr_comment.md
        # fi
        
        echo "" >> pr_comment.md
        echo "<details><summary>📄 View Details</summary>" >> pr_comment.md
        echo "" >> pr_comment.md
        echo '```' >> pr_comment.md
        cat sonar_result.txt >> pr_comment.md
        echo '```' >> pr_comment.md
        echo "</details>" >> pr_comment.md
        echo "" >> pr_comment.md

        # Determine overall status based on failures and warnings
        if [ "$HAS_FAILURES" == "true" ]; then
          OVERALL_STATUS="❌ Failed"
          PIPELINE_STATUS="FAILED"
        elif [ "$HAS_WARNINGS" == "true" ]; then
          OVERALL_STATUS="⚠️ Warning"
          PIPELINE_STATUS="WARNING"
        else
          OVERALL_STATUS="✅ Success"
          PIPELINE_STATUS="SUCCESS"
        fi

        # Overall Status
        echo "---" >> pr_comment.md
        echo "" >> pr_comment.md
        echo "## 📊 Overall Pipeline Status" >> pr_comment.md
        echo "**Status:** $OVERALL_STATUS" >> pr_comment.md
        echo "" >> pr_comment.md
        
        if [ "$HAS_FAILURES" == "true" ]; then
          FAILED_CHECKS=${FAILED_CHECKS%, }
          echo "**Failed Checks:** $FAILED_CHECKS" >> pr_comment.md
          echo "" >> pr_comment.md
          
          if [ "$HAS_WARNINGS" == "true" ]; then
            WARNING_CHECKS=${WARNING_CHECKS%, }
            echo "**Warnings:** $WARNING_CHECKS" >> pr_comment.md
            echo "" >> pr_comment.md
          fi
          
          echo "### 🔧 Quick Fix Commands" >> pr_comment.md
          echo '```bash' >> pr_comment.md
          echo "# Fix formatting issues" >> pr_comment.md
          echo "black ." >> pr_comment.md
          echo "" >> pr_comment.md
          echo "# Run tests locally" >> pr_comment.md
          echo "pytest tests/" >> pr_comment.md
          echo "" >> pr_comment.md
          echo "# Check linting" >> pr_comment.md
          echo "flake8 ." >> pr_comment.md
          echo "" >> pr_comment.md
          echo '```' >> pr_comment.md
        elif [ "$HAS_WARNINGS" == "true" ]; then
          WARNING_CHECKS=${WARNING_CHECKS%, }
          echo "**Warnings:** $WARNING_CHECKS" >> pr_comment.md
          echo "" >> pr_comment.md
          echo "⚠️ This PR has warnings but can proceed with review. Consider addressing the low/medium severity vulnerabilities when possible." >> pr_comment.md
        else
          echo "🎉 **All checks passed!** This PR is ready for review." >> pr_comment.md
        fi
        
        echo "" >> pr_comment.md
        echo "*Generated by CI/Scans Pipeline - $(date)*" >> pr_comment.md

        # Store status for final step
        echo "PIPELINE_STATUS=$PIPELINE_STATUS" >> $GITHUB_ENV

    # --- Post PR Comment ---
    - name: Post PR Comment
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const comment = fs.readFileSync('pr_comment.md', 'utf8');
          
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('CI/Scans Pipeline Results')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }

    # --- Final Status Check ---
    - name: Final Status Check
      if: always()
      run: |
        if [ "$PIPELINE_STATUS" == "FAILED" ]; then
          echo "Pipeline failed - one or more critical checks failed"
          exit 1
        elif [ "$PIPELINE_STATUS" == "WARNING" ]; then
          echo "Pipeline completed with warnings - review recommended but not blocking"
          exit 0
        else
          echo "Pipeline passed - all checks successful"
          exit 0
        fi