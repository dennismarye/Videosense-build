services:
  video-sense:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LOCAL_MODE=true
      - AI_SERVICE_TYPE=mock
      - LOG_LEVEL=DEBUG
      - PORT=8000
    volumes:
      - ./local_storage:/app/local_storage
      - ./src:/app/src
    command: ["python", "main_local.py"]

