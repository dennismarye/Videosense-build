# Project identification
sonar.projectKey=dev-video-classification

# Source code configuration - multiple sources separated by commas
sonar.sources=src,main.py,Dockerfile
sonar.tests=tests

# Python version specification
sonar.python.version=3.11

# Exclusions
sonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**,**/node_modules/**,**/tests/**,**/.pytest_cache/**,**/owasp-reports/**,**/.git/**,**/.github/**

# Test configuration
sonar.python.coverage.reportPaths=coverage.xml

# Branch analysis (for pull requests)
sonar.pullrequest.key=${GITHUB_PR_NUMBER}
sonar.pullrequest.branch=${GITHUB_HEAD_REF}
sonar.pullrequest.base=${GITHUB_BASE_REF}